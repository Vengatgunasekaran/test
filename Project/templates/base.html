<!DOCTYPE html>
<html>
<head>

<title>VentureMatch AI</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/browser_tab.png') }}">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:#f1f5f9;
font-family:'Segoe UI',sans-serif;
}

.navbar{
background:#020617;
border-bottom:1px solid #1e293b;
}

.navbar-brand{
font-size:22px;
letter-spacing:1px;
}

.card{
background:#1e293b;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
color:#e2e8f0;
}

.lead{
color:#cbd5f5;
}

.text-muted{
color:#94a3b8 !important;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand fw-bold" href="/">🚀 VentureMatch AI</a>

<div class="ms-auto">

{% if session.get("user_id") %}

<a class="btn btn-outline-light me-2" href="/dashboard_page">
Dashboard
</a>

<a class="btn btn-outline-light me-2" href="/feed_page">
Feed
</a>

<a class="btn btn-outline-light me-2" href="/logout">
Logout
</a>

{% else %}

<a class="btn btn-outline-light me-2" href="/login">
Login
</a>

<a class="btn btn-outline-light me-2" href="/register">
Register
</a>

{% endif %}

</div>

</div>
</nav>

<div class="container mt-5">

{% block content %}
{% endblock %}

</div>

</body>
</html>
